</head>

<body id="content"> 
    <header>
        <div class="logo-container">
            <a href="index.html"><img src="images/logo.png" alt="Abeokuta Chamber of Commerce logo"></a>
            <h3>Chamber of Commerce</h3>
        </div>
        <div class="socials">
            <a href="https://www.facebook.com/toyosi.adam.7/"><img src="images/facebook.png" alt="Facebook image"></a>
            <a href="https://www.linkedin.com/in/adamadebesin/"><img src="images/linkedin.png" alt="LinkedIn image"></a>
        </div>
        
        <nav class="primary">
            <button id="ham"><span>&#9776;</span><span>X</span></button>
            <ul id="menu">
                <li>
                    <strong><a id="home" href="index.html">Home</a></strong>
                </li>
                <li>
                    <strong><a id="discover" href="discover.html">Discover</a></strong>
                </li>
                <li>
                    <strong><a id="directory" href="directory.html">Directory</a></strong>
                </li>
                <li>
                    <strong><a id="join" href="join.html">Join</a></strong>
                </li>
                <li>
                    <strong><a id="contact" href="">Contact</a></strong>
                </li>
            </ul>
        </nav>

    </header>
    <main id="contactmain">
        <section class="contact-page">
          <h3>Have Some Questions?</h3>
          <div class="contact-card">
            <div class="contact-address">
              <div class="address-grid">
                <img src="./images/NG.png" alt="Flag of Nigeria" />
              </div>
              <p>Ikija, Abeokuta North, Abeokuta, Ogun State, Nigeria</p>
            </div>
            <div class="contact-grid">
              <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
              <lottie-player
                src="https://assets5.lottiefiles.com/packages/lf20_phfi20ra.json"
                background="transparent"
                speed="0.4"
                loop
                class="envelop"
                autoplay
              ></lottie-player>
  
              <form
                class="contact-form"
                action="message-received.html"
                method="get"
              >
                <label class="contact-blockview"
                  >First Name
                  <input
                    type="text"
                    placeholder="First name"
                    name="fname"
                    required
                /></label>
  
                <div class="gap">
                  <label class="contact-blockview"
                    >Last Name
                    <input
                      type="text"
                      placeholder="Last name"
                      name="lname"
                      required
                  /></label>
                </div>
                <div class="gap">
                  <label class="contact-blockview"
                    >Email
                    <input
                      type="email"
                      name="email"
                      placeholder="someone@example.com"
                      required
                  /></label>
                </div>
                <div class="gap">
                  <label class="contact-blockview"
                    >Business Name
                    <input type="text" name="businessname" required
                  /></label>
                </div>
                <div class="gap">
                  <label class="contact-blockview"
                    >Your questions...
                    <textarea
                      name="description"
                      rows="4"
                      cols="50"
                      required
                    ></textarea>
                  </label>
                </div>
  
                <input type="hidden" id="time" name="time" />
  
                <input
                  id="contact-submitBtn"
                  type="submit"
                  value="Send Message"
                />
              </form>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <div class="footer">
            <div class="address">
                <a href="index.html"><img src="images/logo.png" alt="Abeokuta Chamber of Commerce logo"></a>
            
                <h3>Chamber of Commerce</h3>
                <h4>
                    Ikija, Abeokuta North, Abeokuta Ogun State, Nigeria
                </h4>
                <h4>
                    +234-913-069-4355
                </h4>
            </div>
            
            <hr>

            <p>&#169; <span id="copyrightYear"></span> Adam Adebesin .:|:.  Ogun State, Nigeria</p>
                <p id="lastModified">
            </p>
            
        </div>

    </footer>
 
</body>

</html>
